---
layout: base
---

<div class="knowledge-base">
    <h1>{{ page.title }}</h1>
    <ul>
        {% for section in site.data.knowledge_bases %}
        <li>
            <h2>{{ section.name }}</h2>
            <ul>
                {% for article in section.articles %}
                <li>
                    <a href="{{ article.url }}">{{ article.title }}</a>
                </li>
                {% endfor %}
            </ul>
        </li>
        {% endfor %}
    </ul>
</div>
